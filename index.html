                    'taobao': '淘宝',
                    'jd': '京东'

                return `<span class="platform-badge ${platformClasses[platform] || ''}">${platformNames[platform] || platform}</span>`;
            }

                const priceClass = isViolation ? 'price-violation' : 'price-normal';
                return `<span class="price-tag ${priceClass}">¥${price.toFixed(1)}</span>`;
            }

                const statusMap = {
                    'pending': '待处理',
                    'processing': '处理中',
                    'completed': '已下架',
                    'ignored': '已忽略'
                };
                return statusMap[status] || status;

                const remarkClass = remark.includes('拆零') ? 'price-violation' : 'price-normal';
                return `<span class="price-tag ${remarkClass}">${remark}</span>`;
            }

                    // 更新时间信息
                    updateTimeInfo(data.update_time, data.next_collection_time);
                    
                    // 隐藏错误提示（如果有）
                    const errorDiv = document.getElementById('load-error');
                    if (errorDiv) {
                        errorDiv.style.display = 'none';
                    }
                    
                    console.log('✅ 数据加载成功');
                    
                } catch (error) {
                    console.error('❌ 数据加载失败:', error);
                    showLoadError();
                }
            }

            // 更新统计卡片
            function updateStatsCards(summary) {
                // 淘宝
                const taobaoCount = document.getElementById('taobao-count');
                if (taobaoCount) {
                    taobaoCount.innerHTML = `${formatNumber(summary.taobao.violation_count)}<span class="stat-unit">个</span>`;
                }
                const taobaoTrend = document.getElementById('taobao-trend');
                if (taobaoTrend) {
                    taobaoTrend.textContent = summary.taobao.trend_text;
                    taobaoTrend.className = `stat-trend ${getTrendClass(summary.taobao.trend)}`;
                }
                
                // 京东
                const jdCount = document.getElementById('jd-count');
                if (jdCount) {
                    jdCount.innerHTML = `${formatNumber(summary.jd.violation_count)}<span class="stat-unit">个</span>`;
                }
                const jdTrend = document.getElementById('jd-trend');
                if (jdTrend) {
                    jdTrend.textContent = summary.jd.trend_text;
                    jdTrend.className = `stat-trend ${getTrendClass(summary.jd.trend)}`;
                }
                
                // 汇总
                const totalCount = document.getElementById('total-count');
                if (totalCount) {
                    totalCount.innerHTML = `${formatNumber(summary.total_violations)}<span class="stat-unit">个</span>`;
                }
                const totalProcessed = document.getElementById('total-processed');
                if (totalProcessed) {
                    totalProcessed.textContent = `累计发现 ${summary.total_violations} 个`;
                }
            }

            // 更新违价商品表格
            function updateViolationsTable(violations) {
                const tbody = document.querySelector('.data-table tbody');
                
                if (!violations || violations.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #999;">
                                🎉 暂无违价商品数据
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                let html = '';
                violations.forEach(item => {
                    html += `
                        <tr>
                            <td>${createPlatformBadge(item.platform)}</td>
                            <td><a href="${item.product_url || '#'}" target="_blank" class="product-link">${item.title}</a></td>
                            <td>${item.shop_name || '-'}</td>
                            <td>${createPriceTag(item.violation_price, true)}</td>
                            <td>${item.normal_price ? '¥' + item.normal_price.toFixed(1) : '-'}</td>
                            <td>${item.found_time || '-'}</td>
                            <td>${createStatusTag(item.status)}</td>
                            <td>${createRemarkTag(item.remark)}</td>
                        </tr>
                    `;
                });
                
                tbody.innerHTML = html;
            }

            // 更新时间信息
            function updateTimeInfo(updateTime, nextCollectionTime) {
                const lastUpdateEl = document.querySelector('.last-update');
                if (lastUpdateEl && updateTime) {
                    lastUpdateEl.textContent = `最后更新：${updateTime} | 下次自动采集：${nextCollectionTime || '未设置'}`;
                }
            }

            // 显示加载错误
            function showLoadError() {
                // 不再显示错误提示，直接使用内嵌数据
                console.log('ℹ️ 使用内嵌数据显示');
            }

            // 下载 Excel 报表
            function downloadExcelReport() {
                try {
                    // 从内嵌数据或已加载的数据生成 Excel
                    const data = window.currentData || EMBEDDED_DATA;
                    
                    // 创建 CSV 内容（简化版本，实际可用 SheetJS 库）
                    let csvContent = '\uFEFF'; // BOM for UTF-8
                    csvContent += '平台，商品名称，店铺名称，违价，正常价，发现时间，状态，备注\n';
                    
                    data.violations.forEach(item => {
                        const row = [
                            item.platform === 'taobao' ? '淘宝' : '京东',
                            `"${item.title}"`,
                            `"${item.shop_name || '-'}"`,
                            item.violation_price,
                            item.normal_price || '-',
                            item.found_time || '-',
                            item.status || 'pending',
                            item.remark || '-'
                        ].join(',');
                        csvContent += row + '\n';
                    });
                    
                    // 创建下载链接
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    const url = URL.createObjectURL(blob);
                    link.setAttribute('href', url);
                    link.setAttribute('download', `违价监控报表_${new Date().toISOString().split('T')[0]}.csv`);
                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    console.log('✅ 报表下载成功');
                } catch (error) {
                    console.error('❌ 报表下载失败:', error);
                    alert('报表下载失败，请稍后重试');
                }
            }

            // 跳转到淘宝搜索
            function jumpToTaobao() {
                window.open(CONFIG.TAobao_SEARCH_URL, '_blank');
            }

            // 跳转到京东搜索
            function jumpToJD() {
                window.open(CONFIG.JD_SEARCH_URL, '_blank');
            }

            // 初始化
            document.addEventListener('DOMContentLoaded', function() {
                // 设置当前日期
                const today = new Date();
                const dateStr = today.toLocaleDateString('zh-CN', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit' 
                });
                document.getElementById('currentDate').textContent = '📅 ' + dateStr;
                
                // 绑定下载按钮事件
                const downloadBtn = document.querySelector('.download-btn');
                if (downloadBtn) {
                    downloadBtn.onclick = downloadExcelReport;
                }
                
                // 绑定平台卡片点击事件（可选）
                const taobaoCard = document.querySelector('.stat-card.taobao');
                const jdCard = document.querySelector('.stat-card.jd');
                
                if (taobaoCard) {
                    taobaoCard.style.cursor = 'pointer';
                    taobaoCard.title = '点击跳转到淘宝搜索';
                    taobaoCard.onclick = jumpToTaobao;
                }
                
                if (jdCard) {
                    jdCard.style.cursor = 'pointer';
                    jdCard.title = '点击跳转到京东搜索';
                    jdCard.onclick = jumpToJD;
                }
                
                // 加载数据
                loadDashboardData();
                
                // 自动刷新（如果启用）
                if (CONFIG.AUTO_REFRESH) {
                    setInterval(loadDashboardData, CONFIG.REFRESH_INTERVAL);
                }
            });
        </script>
    </body>
</html>
